<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить операцию</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 20px; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #2c3e50; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        .btn { background: #27ae60; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .btn:hover { background: #219a52; }
        .btn-back { background: #95a5a6; margin-left: 10px; text-decoration: none; display: inline-block; text-align: center; }
        .btn-back:hover { background: #7f8c8d; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>➕ Добавить операцию</h1>
            <form method="POST">
                <div class="form-group">
                    <label>Дата</label>
                    <input type="date" name="date" required>
                </div>

                <div class="form-group">
                    <label>Тип</label>
                    <select name="type" id="type" required>
                        <option value="">Выберите тип</option>
                        <option value="Расход">Расход</option>
                        <option value="Доход">Доход</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Категория</label>
                    <select name="category" id="category" required>
                        <option value="">Сначала выберите тип</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Подкатегория</label>
                    <select name="subcategory" id="subcategory">
                        <option value="">Выберите категорию</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Сумма (₽)</label>
                    <input type="number" name="amount" step="0.01" required>
                </div>

                <div class="form-group">
                    <label>Комментарий</label>
                    <input type="text" name="comment">
                </div>

                <button type="submit" class="btn">💾 Сохранить</button>
                <a href="{{ url_for('index') }}" class="btn btn-back">↩️ Назад</a>
            </form>
        </div>
    </div>

    <script>
        const categories = {{ categories|tojson }};

        const typeSelect = document.getElementById('type');
        const categorySelect = document.getElementById('category');
        const subcategorySelect = document.getElementById('subcategory');

        typeSelect.addEventListener('change', function() {
            const type = this.value;
            categorySelect.innerHTML = '<option value="">Выберите категорию</option>';
            subcategorySelect.innerHTML = '<option value="">Выберите категорию</option>';

            if (type && categories[type]) {
                for (let cat in categories[type]) {
                    const option = document.createElement('option');
                    option.value = cat;
                    option.textContent = cat;
                    categorySelect.appendChild(option);
                }
            }
        });

        categorySelect.addEventListener('change', function() {
            const type = typeSelect.value;
            const category = this.value;
            subcategorySelect.innerHTML = '<option value="">Выберите подкатегорию</option>';

            if (type && category && categories[type][category]) {
                categories[type][category].forEach(sub => {
                    if (sub) {
                        const option = document.createElement('option');
                        option.value = sub;
                        option.textContent = sub;
                        subcategorySelect.appendChild(option);
                    }
                });
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финансовый трекер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* Навигация */
        .navbar { background: #2c3e50; color: white; padding: 15px 0; margin-bottom: 30px; }
        .nav-container { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; gap: 30px; }
        .nav-link { color: white; text-decoration: none; font-size: 16px; padding: 8px 16px; border-radius: 5px; }
        .nav-link:hover { background: #34495e; }

        /* Карточки */
        .card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; border-radius: 10px; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stat-value { font-size: 28px; font-weight: bold; margin: 10px 0; }
        .income { color: #27ae60; }
        .expense { color: #e74c3c; }

        /* Таблицы */
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f8f9fa; font-weight: 600; }
        tr:hover { background: #f5f5f5; }

        /* Формы */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #2980b9; }

        /* Индикаторы */
        .green { background: #d4edda; color: #155724; padding: 10px; border-radius: 5px; }
        .yellow { background: #fff3cd; color: #856404; padding: 10px; border-radius: 5px; }
        .red { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; }

        .flash { padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }

        .delete { color: #e74c3c; text-decoration: none; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('index') }}" class="nav-link">📊 Дашборд</a>
            <a href="{{ url_for('regular') }}" class="nav-link">💰 Регулярные платежи</a>
            <a href="{{ url_for('categories') }}" class="nav-link">📁 Категории</a>
            <a href="{{ url_for('add') }}" class="nav-link">➕ Добавить операцию</a>
        </div>
    </div>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>

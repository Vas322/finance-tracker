<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Восстановление пароля — Финансовый трекер</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0/dist/css/adminlte.min.css">
</head>
<body class="login-page bg-body-secondary">
<div class="login-box">
    <div class="card card-outline card-warning">
        <div class="card-header text-center">
            <a href="/" class="h1">💰 <b>Финансовый</b> трекер</a>
        </div>
        <div class="card-body">
            <p class="login-box-msg">Восстановление пароля</p>
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}
            <form method="POST"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="input-group mb-3">
                    <input type="email" name="email" class="form-control" placeholder="Email, указанный при регистрации" required autofocus>
                    <div class="input-group-text">
                        <i class="bi bi-envelope"></i>
                    </div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <button type="submit" class="btn btn-warning w-100">Отправить ссылку для сброса</button>
                    </div>
                </div>
            </form>
            <p class="mt-3 mb-0 text-center">
                <a href="{{ url_for('auth.login') }}">← Вернуться ко входу</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>

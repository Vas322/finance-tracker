<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регулярные платежи</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { margin-bottom: 20px; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #34495e; color: white; }
        input { width: 100px; padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
        input.date-input { width: 130px; }
        .btn { background: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-danger { background: #e74c3c; }
        .btn-primary { background: #3498db; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .btn-back { background: #95a5a6; text-decoration: none; display: inline-block; padding: 10px 20px; border-radius: 5px; color: white; }
        .total { margin-top: 20px; font-size: 18px; font-weight: bold; }
        .form-add { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .form-group { display: inline-block; margin-right: 10px; }
        .form-group label { display: block; font-size: 12px; margin-bottom: 5px; }
        .delete-form { display: inline; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>💰 Регулярные платежи</h1>

            <!-- ОСНОВНАЯ ФОРМА ДЛЯ ОБНОВЛЕНИЯ -->
            <form method="POST" id="updateForm">
                <table>
                    <thead>
                        <tr><th>Дата списания</th><th>Название</th><th>Сумма (₽)</th><th>Действия</th></tr>
                    </thead>
                    <tbody>
                        {% for p in payments %}
                        <tr>
                            <td><input type="date" name="day_{{ p.id }}" value="{{ p.day }}" class="date-input"></td>
                            <td>{{ p.name }}</td>
                            <td><input type="number" name="amount_{{ p.id }}" value="{{ p.amount }}" step="0.01"></td>
                            <td>
                                <button type="button" class="btn btn-danger btn-sm" onclick="deletePayment({{ p.id }}, '{{ p.name }}')">❌</button>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                <button type="submit" class="btn">💾 Сохранить изменения</button>
                <a href="{{ url_for('index') }}" class="btn-back">↩️ На главную</a>
            </form>

            <div class="total">
                Итого за месяц: {{ "{:,.0f}".format(payments|sum(attribute='amount')).replace(",", " ") }} ₽
            </div>
        </div>

        <div class="card form-add">
            <h3>➕ Добавить новый платёж</h3>
            <form method="POST" id="addForm">
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" name="add_name" required style="width: 200px;">
                </div>
                <div class="form-group">
                    <label>Сумма (₽)</label>
                    <input type="number" name="add_amount" step="0.01" required style="width: 120px;">
                </div>
                <div class="form-group">
                    <label>Дата списания</label>
                    <input type="date" name="add_day" required style="width: 150px;">
                </div>
                <button type="submit" class="btn btn-primary">➕ Добавить</button>
            </form>
        </div>
    </div>

    <!-- Форма для удаления (скрытая) -->
    <form method="POST" id="deleteForm" style="display: none;">
        <input type="hidden" name="delete_id" id="delete_id">
    </form>

    <script>
        function deletePayment(id, name) {
            if (confirm('Удалить ' + name + '?')) {
                document.getElementById('delete_id').value = id;
                document.getElementById('deleteForm').submit();
            }
        }
    </script>
</body>
</html>

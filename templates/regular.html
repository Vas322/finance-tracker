{% extends "base.html" %}
{% block content %}
<div class="card">
    <h1>💰 Регулярные платежи</h1>
    
    <form method="POST">
        <table>
            <thead>
                <tr><th>Дата списания</th><th>Название</th><th>Сумма (₽)</th><th></th></tr>
            </thead>
            <tbody>
                {% for p in payments %}
                <tr>
                    <td><input type="date" name="day_{{ p.id }}" value="{{ p.day }}"></td>
                    <td>{{ p.name }}</td>
                    <td><input type="number" name="amount_{{ p.id }}" value="{{ p.amount }}" step="0.01"></td>
                    <td><button type="submit" name="delete_id" value="{{ p.id }}" class="delete" onclick="return confirm('Удалить?')">❌</button></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button type="submit" class="btn">💾 Сохранить изменения</button>
    </form>
    
    <div style="margin-top: 20px;">
        <h3>➕ Добавить платёж</h3>
        <form method="POST">
            <input type="text" name="add_name" placeholder="Название" required>
            <input type="number" name="add_amount" placeholder="Сумма" step="0.01" required>
            <input type="date" name="add_day" required>
            <button type="submit" class="btn">Добавить</button>
        </form>
    </div>
</div>
{% endblock %}
